<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/findna-design-system-beecc405-c734-4c81-ab98-959630ecfa3a/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/findna-design-system-beecc405-c734-4c81-ab98-959630ecfa3a/tokens/colors.css">
  <link rel="stylesheet" href="_ds/findna-design-system-beecc405-c734-4c81-ab98-959630ecfa3a/tokens/typography.css">
  <link rel="stylesheet" href="_ds/findna-design-system-beecc405-c734-4c81-ab98-959630ecfa3a/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/findna-design-system-beecc405-c734-4c81-ab98-959630ecfa3a/tokens/radius.css">
  <link rel="stylesheet" href="_ds/findna-design-system-beecc405-c734-4c81-ab98-959630ecfa3a/tokens/shadows.css">
  <link rel="stylesheet" href="_ds/findna-design-system-beecc405-c734-4c81-ab98-959630ecfa3a/tokens/base.css">
  <link rel="stylesheet" href="_ds/findna-design-system-beecc405-c734-4c81-ab98-959630ecfa3a/styles.css">
  <script src="_ds/findna-design-system-beecc405-c734-4c81-ab98-959630ecfa3a/_ds_bundle.js"></script>
  <style>
    body{margin:0;background:var(--bg);font-family:'Tajawal',sans-serif}
    a{color:var(--primary);text-decoration:none}
    a:hover{color:var(--primary-600)}
    @keyframes fdFadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</helmet>
<div dir="rtl" style="min-height:100vh;background:var(--bg);font-family:'Tajawal',sans-serif;color:var(--text)" data-screen-label="Customer Search">

  <div style="background:var(--surface);border-bottom:1px solid var(--line);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;letter-spacing:1.5px;color:var(--copper)">FinDNA</div>
      <div style="width:1px;height:20px;background:var(--line)"></div>
      <div style="font-size:14px;font-weight:700;color:var(--ink)">لوحة الموظف — البحث عن عميل</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:12.5px;color:var(--text-2)">فرع الرياض الرئيسي · نورة العتيبي</div>
      <div style="width:36px;height:36px;border-radius:12px;background:var(--primary-50);border:1px solid var(--primary-100);display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--primary)">ن</div>
    </div>
  </div>

  <div style="max-width:860px;margin:0 auto;padding:48px 32px 64px;display:flex;flex-direction:column;gap:20px;animation:fdFadeUp .35s ease both">

    <div style="text-align:center;margin-bottom:4px">
      <div style="font-size:26px;font-weight:900;color:var(--ink);letter-spacing:-.3px">اختر العميل</div>
      <div style="font-size:13.5px;color:var(--text-2);margin-top:6px">ابحث برقم العميل أو الاسم، أو اختر من القائمة أدناه</div>
    </div>

    <div style="background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:18px 20px;box-shadow:var(--sh-sm)">
      <div style="display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);border-radius:14px;padding:12px 16px;background:var(--surface)" style-focus="border-color:var(--primary)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
        <input value="{{ query }}" onChange="{{ onQuery }}" placeholder="رقم العميل أو الاسم — مثال: 100482913" style="flex:1;border:0;outline:0;background:transparent;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--ink)"></input>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px">
      <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ true }}">
        <sc-for list="{{ results }}" as="c" hint-placeholder-count="4">
          <a href="{{ c.href }}" style="display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:16px 20px;box-shadow:var(--sh-sm);cursor:pointer;transition:border-color .2s,transform .2s;color:inherit" style-hover="border-color:var(--primary);transform:translateY(-1px)">
            <div style="display:flex;align-items:center;gap:14px">
              <div style="width:48px;height:48px;border-radius:16px;background:linear-gradient(160deg,var(--primary-50),#fff);border:1px solid var(--primary-100);display:grid;place-items:center;font-size:17px;font-weight:900;color:var(--primary)">{{ c.initial }}</div>
              <div>
                <div style="font-size:15px;font-weight:800;color:var(--ink)">{{ c.name }}</div>
                <div style="font-size:12px;color:var(--text-2);margin-top:2px">رقم العميل <span class="fd-num" style="font-weight:600">{{ c.id }}</span> · {{ c.segment }}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:18px">
              <div style="text-align:center">
                <div class="fd-num" style="font-size:17px;font-weight:800;color:{{ c.scoreColor }}">{{ c.dna }}</div>
                <div style="font-size:10px;font-weight:700;color:var(--text-3)">درجة DNA</div>
              </div>
              <span style="font-size:18px;color:var(--text-3)">‹</span>
            </div>
          </a>
        </sc-for>
      </sc-if>
      <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
        <div style="background:var(--surface);border:1px dashed var(--line);border-radius:20px;padding:28px;text-align:center;font-size:13.5px;color:var(--text-2)">لا توجد نتائج مطابقة — تحقق من رقم العميل أو جرّب اسمًا آخر</div>
      </sc-if>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: '' };
  customers = [
    { id: '100482913', name: 'أحمد السالم', initial: 'أ', segment: 'عميل منذ 2019 · راتب محوّل', dna: 82, href: 'FinDNA Dashboard - Ahmed.dc.html' },
    { id: '100731544', name: 'سارة القحطاني', initial: 'س', segment: 'عميلة منذ 2021 · راتب محوّل', dna: 74, href: 'FinDNA Dashboard - Sara.dc.html' },
    { id: '100265087', name: 'خالد الدوسري', initial: 'خ', segment: 'عميل منذ 2016 · أعمال حرة', dna: 61, href: '' },
    { id: '100918330', name: 'نوف الشمري', initial: 'ن', segment: 'عميلة منذ 2023 · طالبة', dna: 55, href: '' },
    { id: '100104772', name: 'فهد العتيبي', initial: 'ف', segment: 'عميل منذ 2014 · متقاعد', dna: 68, href: '' },
  ];
  renderVals() {
    const q = this.state.query.trim();
    const results = (q ? this.customers.filter(c => c.id.includes(q) || c.name.includes(q)) : this.customers)
      .map(c => ({ ...c, scoreColor: c.dna >= 75 ? 'var(--success)' : c.dna >= 60 ? 'var(--copper)' : 'var(--danger)' }));
    return {
      query: this.state.query,
      onQuery: (e) => this.setState({ query: e.target.value }),
      results,
      hasResults: results.length > 0,
      noResults: results.length === 0,
    };
  }
}
</script>
</body>
</html>
